<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOOTS - Arena Shooter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="damage-overlay"></div>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="kills-count">Kills: 0</div>
        <div id="ammo-count">12 / 12</div>
        <div id="health-bar">
            <div id="health-fill"></div>
        </div>
        <div id="weapon-info">Pistola</div>
        <div id="instructions">
            <h1>SHOOTS</h1>
            <p>Clique para Iniciar</p>
            <p>(WASD) Movimentar | (ESPAÇO) Pular | (LMB) Atirar</p>
            <p>(1) Pistola | (2) SMG | (3) Sniper | (4) Faca 🔪</p>
            <p>(R) Recarregar</p>
            <p style="color: #ffaa00; margin-top: 0.5rem;">🔪 Faca = +50% Velocidade!</p>
            <p style="color: #ff5555; font-size: 0.9rem; margin-top: 0.5rem;">Elimine os bots inimigos!</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js?v=4"></script>
</body>
</html>
